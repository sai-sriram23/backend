spring.application.name=cabsystemsms

# H2 In-Memory Database (used by default / on Render free tier)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:cabsystemdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Render injects PORT; falls back to 8085 for local dev
server.port=${PORT:8085}
